name: Itoen Watcher

# 1時間おきに自動実行 + 手動実行ボタンも使えるようにしておく
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  check-availability:
    runs-on: ubuntu-latest
    # 前回チェック結果(state.json)を書き換えるので、コミット権限が必要
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run watcher
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python watcher.py

      - name: Commit updated state.json
        run: |
          git config user.name "itoen-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "update state [skip ci]"
          git pull --rebase origin main
          git push
        continue-on-error: true

      # スクリーンショットはリポジトリを肥大化させるので、
      # git commitではなくActionsのアーティファクトとして
      # 一時保存する（デフォルト90日で自動削除される）
      - name: Upload screenshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 7

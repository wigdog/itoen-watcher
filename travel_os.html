<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Travel OS ─ 旅行をもっと自由に</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0..200" />
<style>
:root{
  --ocean:#0F6BA8;
  --ocean-deep:#0A4B78;
  --sky:#5BB8E8;
  --sunset:#FF7A45;
  --bg:#F7FAFC;
  --surface:#FFFFFF;
  --glass:rgba(255,255,255,0.72);
  --ink:#0E2233;
  --ink-soft:#5A7080;
  --line:#E4ECF1;
  --success:#2FAE6B;
  --warning:#E8A93B;
  --error:#E5484D;
  --radius:16px;
  --radius-lg:24px;
  --shadow:0 8px 24px -8px rgba(15,107,168,0.18);
  --shadow-sm:0 2px 8px rgba(14,34,51,0.06);
  font-family:"Zen Kaku Gothic New","Poppins",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--ink);}
body{overflow-x:hidden;}
.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;line-height:1;}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit;}
input,textarea,select{font-family:inherit;}
::-webkit-scrollbar{width:0;height:0;}

/* ---------- App Frame ---------- */
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column;}

/* ---------- Onboarding ---------- */
.onboard{position:relative;min-height:100vh;display:flex;flex-direction:column;color:#fff;overflow:hidden;background:var(--ink);}
.onboard .photo-frame{position:relative;height:56vh;min-height:340px;overflow:hidden;}
.onboard .photo-frame img{width:100%;height:100%;object-fit:cover;object-position:center 42%;display:block;}
.onboard .photo-frame .fade{position:absolute;left:0;right:0;bottom:0;height:38%;background:linear-gradient(180deg,rgba(6,20,32,0) 0%,#0B1B2A 100%);}
.onboard .photo-frame .eyebrow{position:absolute;top:20px;left:24px;display:flex;align-items:center;gap:8px;font-family:'Poppins';font-size:11px;letter-spacing:.14em;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5);}
.onboard .photo-frame .eyebrow .dot{width:5px;height:5px;border-radius:50%;background:#fff;opacity:.7;}
.onboard .panel{position:relative;flex:1;background:#0B1B2A;padding:22px 28px 40px;z-index:2;display:flex;flex-direction:column;}
.onboard h1{font-size:28px;font-weight:900;line-height:1.4;letter-spacing:.02em;margin-bottom:12px;}
.onboard p.lead{font-size:13.5px;line-height:1.85;opacity:.82;margin-bottom:22px;max-width:340px;}
.onboard-features{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px;}
.onboard-features .f{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;opacity:.9;}
.onboard-features .f .ic{width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.10);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.18);}
.btn-primary{background:linear-gradient(135deg,var(--ocean),var(--ocean-deep));color:#fff;padding:16px;border-radius:16px;font-size:15px;font-weight:700;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 10px 24px -6px rgba(10,75,120,0.5);letter-spacing:.02em;transition:transform .15s ease, box-shadow .15s ease;}
.btn-primary:active{transform:scale(.98);}
.btn-ghost-light{color:#fff;font-size:13px;opacity:.85;text-align:center;margin-top:14px;width:100%;padding:8px;text-decoration:underline;text-underline-offset:3px;}

/* ---------- Top bar ---------- */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px;position:sticky;top:0;background:var(--bg);z-index:20;}
.topbar h2{font-size:18px;font-weight:700;letter-spacing:.01em;}
.topbar .icon-btn{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--surface);box-shadow:var(--shadow-sm);}
.topbar .side{display:flex;gap:8px;align-items:center;}
.back-row{display:flex;align-items:center;gap:4px;color:var(--ink-soft);font-size:13px;}

/* ---------- Screen container ---------- */
.screen{flex:1;display:none;flex-direction:column;padding-bottom:100px;animation:fadein .25s ease;}
.screen.active{display:flex;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ---------- Trip list ---------- */
.trip-list{padding:6px 20px 20px;display:flex;flex-direction:column;gap:16px;}
.trip-card{border-radius:var(--radius-lg);overflow:hidden;background:var(--surface);box-shadow:var(--shadow);position:relative;}
.trip-card .thumb{height:150px;background-size:cover;background-position:center;position:relative;}
.trip-card .thumb .badge{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.85);backdrop-filter:blur(6px);padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;color:var(--ocean-deep);}
.trip-card .body{padding:16px 18px 18px;}
.trip-card .title{font-size:17px;font-weight:700;margin-bottom:4px;}
.trip-card .meta{font-size:12px;color:var(--ink-soft);margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap;}
.trip-card .meta span{display:inline-flex;align-items:center;gap:3px;}
.progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.progress-row .amt{font-size:13px;font-weight:700;color:var(--ocean-deep);}
.progress-row .pct{font-size:12px;color:var(--ink-soft);font-weight:600;}
.progress-bar{height:6px;background:var(--line);border-radius:100px;overflow:hidden;margin-bottom:14px;}
.progress-bar > div{height:100%;background:linear-gradient(90deg,var(--sky),var(--ocean));border-radius:100px;}
.trip-actions{display:flex;gap:8px;}
.trip-actions button{flex:1;padding:10px;border-radius:12px;font-size:12.5px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px;}
.trip-actions .start{background:var(--ocean);color:#fff;}
.trip-actions .edit{background:var(--bg);color:var(--ink);border:1px solid var(--line);}
.trip-actions .more{width:38px;flex:none;background:var(--bg);border:1px solid var(--line);}

.fab{position:fixed;bottom:28px;right:calc(50% - 240px + 20px);width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--ocean),var(--ocean-deep));color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px -4px rgba(10,75,120,.5);z-index:30;}
@media(max-width:520px){.fab{right:20px;}}

.empty-state{padding:60px 30px;text-align:center;color:var(--ink-soft);}
.empty-state .ic{width:64px;height:64px;border-radius:20px;background:var(--surface);box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--ocean);}
.empty-state h3{color:var(--ink);font-size:16px;margin-bottom:6px;}
.empty-state p{font-size:13px;line-height:1.7;margin-bottom:20px;}

/* ---------- Tabs (Day / bottom nav) ---------- */
.day-tabs{display:flex;gap:8px;padding:14px 20px;overflow-x:auto;}
.day-tabs button{flex:none;padding:10px 16px;border-radius:100px;font-size:13px;font-weight:700;background:var(--surface);color:var(--ink-soft);box-shadow:var(--shadow-sm);white-space:nowrap;}
.day-tabs button.active{background:var(--ocean);color:#fff;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--glass);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:40;}
.bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:12px;color:var(--ink-soft);font-size:10px;font-weight:600;}
.bottom-nav button.active{color:var(--ocean);}
.bottom-nav button .material-symbols-rounded{font-size:22px;}

/* ---------- Timeline / Event cards ---------- */
.timeline{padding:6px 20px 20px;}
.tl-item{display:flex;gap:14px;position:relative;}
.tl-item .rail{width:24px;display:flex;flex-direction:column;align-items:center;flex:none;}
.tl-item .dot{width:12px;height:12px;border-radius:50%;background:var(--line);border:2px solid var(--surface);z-index:1;}
.tl-item.done .dot{background:var(--success);}
.tl-item.current .dot{background:var(--sunset);box-shadow:0 0 0 4px rgba(255,122,69,.2);}
.tl-item .line{flex:1;width:2px;background:var(--line);margin:2px 0;}
.tl-item:last-child .line{display:none;}
.tl-card{flex:1;background:var(--surface);border-radius:14px;padding:12px 14px;margin-bottom:14px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px;}
.tl-item.done .tl-card{opacity:.55;}
.tl-item.current .tl-card{border:1.5px solid var(--sunset);}
.tl-card .cat-ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;}
.tl-card .info{flex:1;min-width:0;}
.tl-card .time{font-size:11px;color:var(--ink-soft);font-weight:600;}
.tl-card .name{font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-card .sub{font-size:11.5px;color:var(--ink-soft);}
.tl-card .chev{color:var(--ink-soft);}

/* ---------- Now Card (Home) ---------- */
.home-wrap{padding:0 20px 20px;}
.clock-row{display:flex;align-items:baseline;justify-content:space-between;padding:18px 4px 10px;}
.clock-row .time{font-size:34px;font-weight:800;font-family:'Poppins';letter-spacing:-.01em;}
.clock-row .day{font-size:13px;color:var(--ink-soft);font-weight:600;}
.now-card{background:linear-gradient(150deg,var(--ocean) 0%,var(--ocean-deep) 100%);border-radius:var(--radius-lg);padding:22px 22px 24px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden;margin-bottom:14px;}
.now-card::after{content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.08);}
.now-card .label{font-size:11.5px;opacity:.8;font-weight:700;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.now-card .title-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.now-card .cat-ic-lg{width:46px;height:46px;border-radius:14px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;}
.now-card .title-row .t{font-size:20px;font-weight:800;line-height:1.3;}
.now-card .meta-row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
.now-card .meta-row .m{font-size:12.5px;opacity:.92;display:flex;align-items:center;gap:5px;font-weight:600;}
.now-card .map-btn{background:rgba(255,255,255,.95);color:var(--ocean-deep);padding:12px;border-radius:12px;font-size:13.5px;font-weight:800;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;}
.next-strip{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:14px;padding:12px 14px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.next-strip .label{font-size:10.5px;color:var(--ink-soft);font-weight:700;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat-box{background:var(--surface);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow-sm);}
.stat-box .l{font-size:11px;color:var(--ink-soft);font-weight:600;margin-bottom:4px;}
.stat-box .v{font-size:19px;font-weight:800;font-family:'Poppins';}
.quick-links{display:flex;gap:10px;margin:16px 0 6px;overflow-x:auto;}
.quick-links button{flex:none;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--ink-soft);}
.quick-links button .ic{width:52px;height:52px;border-radius:16px;background:var(--surface);box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;color:var(--ocean);}

/* ---------- Info detail card (hotel/restaurant) ---------- */
.info-photo{width:100%;height:190px;object-fit:cover;border-radius:var(--radius-lg);margin-bottom:14px;background:var(--line);}
.info-title{font-size:19px;font-weight:800;margin-bottom:2px;}
.info-rate{font-size:13px;color:var(--ink-soft);margin-bottom:16px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.info-pill{background:var(--surface);border-radius:12px;padding:10px 12px;box-shadow:var(--shadow-sm);}
.info-pill .l{font-size:10.5px;color:var(--ink-soft);font-weight:600;margin-bottom:2px;}
.info-pill .v{font-size:13.5px;font-weight:700;}
.info-list{background:var(--surface);border-radius:14px;box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:14px;}
.info-list .row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line);}
.info-list .row:last-child{border-bottom:none;}
.info-list .row .l{font-size:12.5px;color:var(--ink-soft);display:flex;align-items:center;gap:8px;}
.info-list .row .v{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:6px;}
.copy-chip{background:var(--bg);border-radius:8px;padding:3px 8px;font-size:11px;color:var(--ocean);font-weight:700;display:flex;align-items:center;gap:3px;}

/* ---------- Budget ---------- */
.donut-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0 10px;}
.donut-center{position:absolute;text-align:center;}
.donut-center .l{font-size:11px;color:var(--ink-soft);font-weight:600;}
.donut-center .v{font-size:24px;font-weight:800;font-family:'Poppins';color:var(--ocean-deep);}
.donut-center .t{font-size:11px;color:var(--ink-soft);}
.legend{padding:16px 4px;display:flex;flex-direction:column;gap:2px;}
.legend .row{display:flex;align-items:center;justify-content:space-between;padding:10px 6px;border-bottom:1px solid var(--line);}
.legend .row:last-child{border-bottom:none;}
.legend .name{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;}
.legend .dot2{width:9px;height:9px;border-radius:50%;flex:none;}
.legend .amt{font-size:13.5px;font-weight:700;}

/* ---------- Form elements ---------- */
.form-section{padding:18px 20px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:7px;}
.field input[type=text],.field input[type=number],.field input[type=time],.field input[type=date],.field textarea,.field select{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line);background:var(--surface);font-size:14.5px;color:var(--ink);}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--ocean);}
.field textarea{resize:vertical;min-height:70px;}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.cat-pick{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 4px;border-radius:14px;border:1.5px solid var(--line);background:var(--surface);font-size:10.5px;font-weight:600;color:var(--ink-soft);}
.cat-pick.active{border-color:var(--ocean);background:rgba(15,107,168,.07);color:var(--ocean-deep);}
.cat-pick .em{font-size:20px;}
.color-grid{display:flex;gap:10px;flex-wrap:wrap;}
.color-dot{width:30px;height:30px;border-radius:50%;border:3px solid transparent;}
.color-dot.active{border-color:var(--ink);}
.upload-box{width:100%;height:140px;border-radius:14px;border:1.5px dashed var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--ink-soft);font-size:12.5px;font-weight:600;background:var(--surface);overflow:hidden;position:relative;}
.upload-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.checklist-row{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line);}
.checklist-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--ocean);}
.checklist-row.checked span{text-decoration:line-through;color:var(--ink-soft);}
.checklist-row span{flex:1;font-size:14px;}

/* ---------- Modal / sheet ---------- */
.sheet-backdrop{position:fixed;inset:0;background:rgba(10,25,38,.45);z-index:90;display:none;}
.sheet-backdrop.active{display:block;}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:var(--surface);border-radius:24px 24px 0 0;z-index:91;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.9,.3,1);padding-bottom:24px;}
.sheet.active{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--line);border-radius:100px;margin:12px auto 6px;}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 6px;}
.sheet-head h3{font-size:16.5px;font-weight:800;}
.sheet-actions{position:sticky;bottom:0;background:var(--surface);padding:12px 20px 4px;display:flex;gap:10px;}
.btn-sm{padding:12px;border-radius:12px;font-size:13.5px;font-weight:700;flex:1;text-align:center;}
.btn-sm.primary{background:var(--ocean);color:#fff;}
.btn-sm.ghost{background:var(--bg);color:var(--ink);border:1px solid var(--line);}
.btn-sm.danger{background:#FDEEEE;color:var(--error);}

/* ---------- Map (SVG route) ---------- */
.map-wrap{padding:6px 20px 20px;}
.map-canvas{width:100%;border-radius:var(--radius-lg);background:linear-gradient(160deg,#DCEFFA,#F3FBFF);box-shadow:var(--shadow-sm);margin-bottom:16px;}
.map-list{display:flex;flex-direction:column;gap:2px;}
.map-list .row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border-radius:14px;margin-bottom:8px;box-shadow:var(--shadow-sm);}
.map-num{width:26px;height:26px;border-radius:50%;background:var(--ocean);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none;}
.map-list .name{font-size:13.5px;font-weight:700;flex:1;}
.map-list .time{font-size:11.5px;color:var(--ink-soft);}

/* ---------- Memory mode ---------- */
.memory-hero{position:relative;border-radius:0 0 28px 28px;overflow:hidden;height:220px;}
.memory-hero .ph{width:100%;height:100%;object-fit:cover;}
.memory-hero .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(6,20,32,.75) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:20px;color:#fff;}
.memory-hero .ov h2{font-size:21px;font-weight:800;}
.memory-hero .ov p{font-size:12px;opacity:.9;}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:14px 20px;}
.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;background:var(--line);}
.mem-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:6px 20px 20px;}
.mem-stat{background:var(--surface);border-radius:14px;padding:14px 10px;text-align:center;box-shadow:var(--shadow-sm);}
.mem-stat .v{font-size:16px;font-weight:800;color:var(--ocean-deep);}
.mem-stat .l{font-size:10px;color:var(--ink-soft);margin-top:2px;}

/* section title */
.sec-title{padding:18px 20px 8px;font-size:13px;font-weight:800;color:var(--ink-soft);letter-spacing:.03em;display:flex;align-items:center;gap:6px;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#0E2233;color:#fff;padding:10px 18px;border-radius:100px;font-size:12.5px;font-weight:600;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

@media(prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>
<div id="app"></div>
<div class="sheet-backdrop" id="sheetBackdrop"></div>

  photo:{label:'撮影スポット',em:'📸',color:'#5B6FE0'},
  ticket:{label:'チケット',em:'🎫',color:'#E8A93B'},
  inbound:{label:'復路交通',em:'✈',color:'#0F6BA8'},
  other:{label:'その他',em:'📍',color:'#7A93A3'}
};
const BUDGET_CATS = [
  {key:'transport',label:'交通',color:'#0F6BA8',cats:['outbound','car','train','bus','inbound']},
  {key:'stay',label:'宿泊',color:'#8A5FD6',cats:['hotel']},
  {key:'food',label:'食事',color:'#FF7A45',cats:['food','cafe']},
  {key:'sight',label:'観光',color:'#2FAE6B',cats:['sight','onsen','photo','ticket']},
  {key:'shop',label:'買い物',color:'#D6459A',cats:['shop']},
  {key:'other',label:'その他',color:'#7A93A3',cats:['walk','other']}
];
function budgetKeyFor(cat){ return (BUDGET_CATS.find(b=>b.cats.includes(cat))||BUDGET_CATS[5]).key; }

const DEFAULT_PACKING = ['財布','スマホ','モバイルバッテリー','充電ケーブル','着替え','薬','カメラ','歯ブラシ'];

let DB = { trips: [] };
let CUR = { tripId:null, dayIdx:0, mode:'list', travelTab:'home', memId:null };
let EDIT_EVENT = null; // event being edited in sheet
let NOW_OVERRIDE = null; // for demo "now" time override per trip

function uid(p){ return p+'_'+Math.random().toString(36).slice(2,9); }
function load(){ try{ const raw = localStorage.getItem('travelos_db'); if(raw) DB = JSON.parse(raw); }catch(e){} }
function save(){ localStorage.setItem('travelos_db', JSON.stringify(DB)); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),1800); }
function yen(n){ return '¥'+Math.round(n||0).toLocaleString(); }
function fmtDate(d){ if(!d) return ''; const dt=new Date(d+'T00:00:00'); return `${dt.getMonth()+1}/${dt.getDate()}`; }
function fmtDateW(d){ if(!d) return ''; const dt=new Date(d+'T00:00:00'); const w=['日','月','火','水','木','金','土'][dt.getDay()]; return `${dt.getMonth()+1}/${dt.getDate()}(${w})`; }

function currentTrip(){ return DB.trips.find(t=>t.id===CUR.tripId); }
function tripDays(trip){
  const s = new Date(trip.startDate+'T00:00:00'), e = new Date(trip.endDate+'T00:00:00');
  const n = Math.max(1, Math.round((e-s)/86400000)+1);
  while(trip.days.length < n){ const idx=trip.days.length; const dt=new Date(s); dt.setDate(dt.getDate()+idx); trip.days.push({date:dt.toISOString().slice(0,10), events:[]}); }
  trip.days.length = n;
  return trip.days;
}
function allEvents(trip){ return trip.days.flatMap((d,di)=>d.events.map(e=>({...e,dayIdx:di,date:d.date}))); }
function tripSpent(trip){ return allEvents(trip).reduce((s,e)=>s+(Number(e.price)||0),0); }
function nowMs(trip){ return NOW_OVERRIDE!=null ? NOW_OVERRIDE : Date.now(); }

/* ---------------- Rendering root ---------------- */
function render(){
  const app = document.getElementById('app');
  if(DB.trips.length===0 && CUR.mode==='list' && !DB._seen){ app.innerHTML = renderOnboard(); bindOnboard(); return; }
  if(CUR.mode==='list'){ app.innerHTML = renderTripList(); bindTripList(); return; }
  if(CUR.mode==='edit'){ app.innerHTML = renderEdit(); bindEdit(); return; }
  if(CUR.mode==='travel'){ app.innerHTML = renderTravel(); bindTravel(); return; }
  if(CUR.mode==='memory'){ app.innerHTML = renderMemory(); bindMemory(); return; }
}

/* ---------------- Trip list ---------------- */
function renderTripList(){
  const cards = DB.trips.map(t=>{
    tripDays(t);
    const spent = tripSpent(t);
    const pct = t.budget>0 ? Math.min(100, Math.round(spent/t.budget*100)) : 0;
    const nights = Math.max(0, t.days.length-1);
    return `
    <div class="trip-card" data-id="${t.id}">
      <div class="thumb" style="background-image:url('${t.thumbnail||HERO_IMG}')">
        <div class="badge">${fmtDate(t.startDate)} - ${fmtDate(t.endDate)}</div>
      </div>
      <div class="body">
        <div class="title">${esc(t.title)}</div>
        <div class="meta">
          <span><span class="material-symbols-rounded" style="font-size:14px">group</span>${t.members||1}名</span>
          <span><span class="material-symbols-rounded" style="font-size:14px">bed</span>${nights}泊${t.days.length}日</span>
        </div>
        <div class="progress-row"><div class="amt">${yen(t.budget)}</div><div class="pct">${pct}%</div></div>
        <div class="progress-bar"><div style="width:${pct}%"></div></div>
        <div class="trip-actions">
          <button class="start" data-act="start" data-id="${t.id}"><span class="material-symbols-rounded" style="font-size:16px">flight_takeoff</span>旅行開始</button>
          <button class="edit" data-act="edit" data-id="${t.id}"><span class="material-symbols-rounded" style="font-size:16px">edit</span>編集</button>
          <button class="more" data-act="more" data-id="${t.id}"><span class="material-symbols-rounded" style="font-size:18px">more_vert</span></button>
        </div>
      </div>
    </div>`;
  }).join('');
  const empty = `
    <div class="empty-state">
      <div class="ic"><span class="material-symbols-rounded" style="font-size:30px">luggage</span></div>
      <h3>まだ旅行がありません</h3>
      <p>右下の＋ボタンから、最初の旅を計画しましょう。</p>
    </div>`;
  return `
  <div class="topbar">
    <h2>旅行一覧</h2>
    <div class="side"><button class="icon-btn" id="btnAbout"><span class="material-symbols-rounded">info</span></button></div>
  </div>
  <div class="screen active">
    <div class="trip-list">${DB.trips.length? cards : empty}</div>
  </div>
  <button class="fab" id="fabAdd"><span class="material-symbols-rounded" style="font-size:26px">add</span></button>
  `;
}
function esc(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function bindTripList(){
  document.getElementById('btnStart')?.addEventListener('click', ()=>{ DB._seen=true; save(); render(); });
  document.getElementById('fabAdd')?.addEventListener('click', createTrip);
  document.getElementById('btnAbout')?.addEventListener('click', ()=>toast('Travel OS ─ 旅行をもっと自由に'));
  document.querySelectorAll('[data-act]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      const id = btn.dataset.id, act = btn.dataset.act;
      if(act==='start'){ CUR.tripId=id; CUR.mode='travel'; CUR.travelTab='home'; render(); }
      if(act==='edit'){ CUR.tripId=id; CUR.mode='edit'; CUR.dayIdx=0; render(); }
      if(act==='more'){ openTripMoreSheet(id); }
    });
  });
}
function createTrip(){
  const today = new Date(); const s = today.toISOString().slice(0,10);
  const e2 = new Date(today.getTime()+2*86400000).toISOString().slice(0,10);
  const t = { id:uid('trip'), title:'新しい旅行', thumbnail:'', startDate:s, endDate:e2, members:2, budget:50000, memo:'',
    days:[], packing: DEFAULT_PACKING.map(n=>({id:uid('pk'),name:n,checked:false})), rating:0, memNote:'' };
  DB.trips.unshift(t); save();
  CUR.tripId=t.id; CUR.mode='edit'; CUR.dayIdx=0; render();
}
function openTripMoreSheet(id){
  const t = DB.trips.find(x=>x.id===id);
  openSheet(`
    <div class="sheet-head"><h3>${esc(t.title)}</h3><button onclick="closeSheet()"><span class="material-symbols-rounded">close</span></button></div>
    <div class="form-section" style="padding-top:6px">
      <div class="sheet-actions" style="flex-direction:column;padding:0;">
        <button class="btn-sm ghost" style="margin-bottom:8px" id="dupTrip"><span class="material-symbols-rounded" style="font-size:16px;vertical-align:-3px">content_copy</span> 複製する</button>
        <button class="btn-sm ghost" style="margin-bottom:8px" id="memTrip"><span class="material-symbols-rounded" style="font-size:16px;vertical-align:-3px">photo_library</span> 思い出を見る</button>
        <button class="btn-sm danger" id="delTrip"><span class="material-symbols-rounded" style="font-size:16px;vertical-align:-3px">delete</span> 削除する</button>
      </div>
    </div>
  `);
  document.getElementById('dupTrip').onclick = ()=>{ const c=JSON.parse(JSON.stringify(t)); c.id=uid('trip'); c.title=t.title+'（コピー）'; DB.trips.unshift(c); save(); closeSheet(); render(); toast('複製しました'); };
  document.getElementById('memTrip').onclick = ()=>{ CUR.tripId=id; CUR.mode='memory'; closeSheet(); render(); };
  document.getElementById('delTrip').onclick = ()=>{ if(confirm('この旅行を削除しますか？')){ DB.trips = DB.trips.filter(x=>x.id!==id); save(); closeSheet(); render(); } };
}

/* ---------------- Sheet helpers ---------------- */
function openSheet(html){
  let sheet = document.getElementById('sheet');
  if(!sheet){ sheet = document.createElement('div'); sheet.id='sheet'; sheet.className='sheet'; document.body.appendChild(sheet); }
  sheet.innerHTML = `<div class="sheet-handle"></div>` + html;
  document.getElementById('sheetBackdrop').classList.add('active');
  requestAnimationFrame(()=>sheet.classList.add('active'));
}
function closeSheet(){
  const sheet = document.getElementById('sheet');
  if(sheet) sheet.classList.remove('active');
  document.getElementById('sheetBackdrop').classList.remove('active');
}
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);
  load(); render();
});

/* ---------------- Edit Mode ---------------- */
function renderEdit(){

  const day = t.days[CUR.dayIdx] || t.days[0];
  const dayTabs = t.days.map((d,i)=>`<button class="${i===CUR.dayIdx?'active':''}" data-day="${i}">DAY${i+1} ${fmtDate(d.date)}</button>`).join('');
  const events = [...day.events].sort((a,b)=>(a.start||'').localeCompare(b.start||''));

    ${navBtn('day','event_note','日程',true)}

function navBtn(key,icon,label,active){
  return `<button data-nav="${key}" class="${active?'active':''}"><span class="material-symbols-rounded">${icon}</span>${label}</button>`;
}
function eventRow(ev, isTravel, state){
  const c = CATS[ev.category]||CATS.other;
  let cls = 'tl-item';
  if(state==='done') cls+=' done'; if(state==='current') cls+=' current';
  return `
  <div class="${cls}">
    <div class="rail"><div class="dot"></div><div class="line"></div></div>
    <div class="tl-card" data-ev="${ev.id}">
      <div class="cat-ic" style="background:${c.color}1A;color:${c.color}">${c.em}</div>
      <div class="info">
        <div class="time">${ev.start||''}${ev.end?(' - '+ev.end):''}</div>
        <div class="name">${esc(ev.title||c.label)}</div>
        <div class="sub">${esc(ev.place||'')}${ev.price?(' ・ '+yen(ev.price)):''}</div>
      </div>
      <span class="material-symbols-rounded chev">chevron_right</span>
    </div>
  </div>`;
}
function bindEdit(){
  document.getElementById('btnBack').onclick = ()=>{ CUR.mode='list'; render(); };
  document.getElementById('btnTripSettings').onclick = ()=>openTripSettingsSheet();
  document.querySelectorAll('[data-day]').forEach(b=>b.onclick=()=>{ CUR.dayIdx=+b.dataset.day; render(); });
  document.querySelectorAll('[data-ev]').forEach(b=>b.onclick=()=>openEventSheet(b.dataset.ev));
  document.getElementById('btnAddEvent').onclick = ()=>openEventSheet(null);
  document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{
    const k = b.dataset.nav;
    if(k==='day') return;
    if(k==='hotel') return openHotelListSheet();

    if(k==='packing') return openPackingSheet();
    if(k==='data') return openDataSheet();
  });
}

  </div>
  <div class="sheet-actions">
    <button class="btn-sm ghost" onclick="closeSheet()">キャンセル</button>
    <button class="btn-sm primary" id="saveTripSettings">保存する</button>
  </div>`);
  document.getElementById('thumbBox').onclick = ()=>document.getElementById('thumbFile').click();
  document.getElementById('thumbFile').onchange = (e)=>{ fileToDataUrl(e.target.files[0], url=>{ t.thumbnail=url; save(); openTripSettingsSheet(); }); };

  };
}

/* ===================== Travel Mode ===================== */
function findScheduleState(trip){
  const evs = allEvents(trip).map(e=>({...e})).sort((a,b)=> (a.date+a.start).localeCompare(b.date+b.start));
  const now = new Date(nowMs(trip));
  const nowStr = now.toISOString().slice(0,10) + (now.toTimeString().slice(0,5));
  let currentIdx = -1;
  for(let i=0;i<evs.length;i++){
    const key = evs[i].date + (evs[i].start||'00:00');
    if(key <= nowStr) currentIdx = i;
  }
  return { evs, currentIdx };
}
function renderTravel(){
  const t = currentTrip(); if(!t){ CUR.mode='list'; return renderTripList(); }
  tripDays(t);
  const tab = CUR.travelTab;

  if(tab==='home') body = travelHome(t);
  else if(tab==='timeline') body = travelTimeline(t);
  else if(tab==='map') body = travelMap(t);
  else if(tab==='budget') body = travelBudget(t);
  else if(tab==='more') body = travelMore(t);
  return `

function travelTimeline(t){
  const dayTabs = t.days.map((d,i)=>`<button class="${i===CUR.dayIdx?'active':''}" data-day2="${i}">DAY${i+1} ${fmtDate(d.date)}</button>`).join('');
  const {evs, currentIdx} = findScheduleState(t);
  const day = t.days[CUR.dayIdx];
  const events = [...day.events].sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  const rows = events.map(ev=>{
    const globalIdx = evs.findIndex(e=>e.id===ev.id);
    const state = globalIdx<currentIdx ? 'done' : (globalIdx===currentIdx? 'current':'');
    return eventRow(ev,true,state).replace('data-ev=','data-tlev=');
  }).join('');
  setTimeout(()=>{ document.querySelectorAll('[data-day2]').forEach(b=>b.onclick=()=>{ CUR.dayIdx=+b.dataset.day2; render(); }); },0);
  return `<div class="day-tabs">${dayTabs}</div><div class="timeline">${rows||'<div class="empty-state"><p>この日の予定はありません</p></div>'}</div>`;
}
function travelMap(t){
  const day = t.days[CUR.dayIdx] || t.days[0];
  const dayTabs = t.days.map((d,i)=>`<button class="${i===CUR.dayIdx?'active':''}" data-day3="${i}">DAY${i+1} ${fmtDate(d.date)}</button>`).join('');
  const events = [...day.events].sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  const n = events.length;
  const W=400,H=260,pad=40;
  let pts = [];
  if(n===1) pts=[[W/2,H/2]];
  else for(let i=0;i<n;i++){ const x = pad + (W-2*pad)*(i/(n-1)); const y = H/2 + Math.sin(i*1.7)*60; pts.push([x,y]); }
  const path = pts.map((p,i)=>(i===0?'M':'L')+p[0]+','+p[1]).join(' ');
  const dots = pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="12" fill="#0F6BA8"/><text x="${p[0]}" y="${p[1]+4}" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" font-family="Poppins">${i+1}</text>`).join('');
  const svg = n ? `<svg class="map-canvas" viewBox="0 0 ${W} ${H}" style="height:220px">
      <path d="${path}" stroke="#7FC1E8" stroke-width="3" fill="none" stroke-dasharray="2 8" stroke-linecap="round"/>
      ${dots}
    </svg>` : `<div class="map-canvas" style="height:220px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:13px">この日の予定はありません</div>`;
  const rows = events.map((ev,i)=>`<div class="row" data-mapev="${ev.id}"><div class="map-num">${i+1}</div><div class="name">${esc(ev.title)}</div><div class="time">${ev.start||''}</div></div>`).join('');
  setTimeout(()=>{ document.querySelectorAll('[data-day3]').forEach(b=>b.onclick=()=>{ CUR.dayIdx=+b.dataset.day3; render(); }); },0);
  return `<div class="day-tabs">${dayTabs}</div><div class="map-wrap">${svg}<div class="map-list">${rows}</div></div>`;
}
function travelBudget(t){

  const byCat = BUDGET_CATS.map(b=>({...b, amt: allEvents(t).filter(e=>budgetKeyFor(e.category)===b.key).reduce((s,e)=>s+(Number(e.price)||0),0)})).filter(b=>b.amt>0 || true);

  const today = new Date(nowMs(t)).toISOString().slice(0,10);

    extra = `<div class="info-grid">
      ${ev.checkin?`<div class="info-pill"><div class="l">チェックイン</div><div class="v">${ev.checkin}</div></div>`:''}
      ${ev.checkout?`<div class="info-pill"><div class="l">チェックアウト</div><div class="v">${ev.checkout}</div></div>`:''}
      ${ev.wifi?`<div class="info-pill"><div class="l">Wi-Fi</div><div class="v">${esc(ev.wifi)}</div></div>`:''}
      ${ev.roomNo?`<div class="info-pill"><div class="l">部屋番号</div><div class="v">${esc(ev.roomNo)}</div></div>`:''}
    </div>`;
  }
  const listRows = [
    ev.place?['place','場所',ev.place]:null,
    ev.address?['home_pin','住所',ev.address]:null,
    ev.phone?['call','電話',ev.phone]:null,
    ev.line?['train','便名/路線',ev.line]:null,
    ev.seat?['event_seat','座席',ev.seat]:null,
    ev.price?['payments','料金',yen(ev.price)]:null,
    ev.reservation?['confirmation_number','予約番号',ev.reservation]:null,
  ].filter(Boolean);
  openSheet(`
  <div class="sheet-head"><h3>${c.em} ${esc(ev.title)}</h3><button onclick="closeSheet()"><span class="material-symbols-rounded">close</span></button></div>
  <div class="form-section" style="padding-top:6px">
    ${ev.photo?`<img class="info-photo" src="${ev.photo}">`:''}
    ${extra}
    <div class="info-list">${listRows.map(([ic,l,v])=>`<div class="row"><div class="l"><span class="material-symbols-rounded" style="font-size:16px">${ic}</span>${l}</div><div class="v">${esc(String(v))}${ic==='confirmation_number'?`<button class="copy-chip" data-copy="${esc(String(v))}"><span class="material-symbols-rounded" style="font-size:13px">content_copy</span>コピー</button>`:''}</div></div>`).join('')}</div>
    ${ev.memo?`<div class="field"><label>メモ</label><p style="font-size:13.5px;line-height:1.8">${esc(ev.memo)}</p></div>`:''}
  </div>
  <div class="sheet-actions">
    ${ev.mapUrl?`<button class="btn-sm primary" id="openMap2" style="flex:1"><span class="material-symbols-rounded" style="font-size:16px;vertical-align:-3px">map</span> 地図を開く</button>`:''}
  </div>`);
  document.getElementById('openMap2')?.addEventListener('click', ()=>window.open(ev.mapUrl,'_blank'));
  document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>{ navigator.clipboard?.writeText(b.dataset.copy); toast('コピーしました'); });
}
function openHotelListSheetReadonly(){ openHotelListSheet(); }

/* ===================== Memory Mode ===================== */
function renderMemory(){
  const t = currentTrip(); if(!t){ CUR.mode='list'; return renderTripList(); }
  const evs = allEvents(t);
  const photos = evs.filter(e=>e.photo).map(e=>e.photo);
  const spent = tripSpent(t);
  const spots = new Set(evs.filter(e=>['sight','onsen','photo','ticket'].includes(e.category)).map(e=>e.title)).size;
  const nights = Math.max(0, t.days.length-1);
  return `
  <div class="topbar" style="position:absolute;top:0;left:0;right:0;z-index:10;background:transparent">
    <div class="back-row" id="btnExitMem" style="background:rgba(255,255,255,.85);padding:6px 12px;border-radius:100px;backdrop-filter:blur(6px)"><span class="material-symbols-rounded">chevron_left</span>戻る</div>
    <div class="side"></div>
  </div>
  <div class="screen active" style="padding-bottom:40px">
    <div class="memory-hero">
      <img class="ph" src="${t.thumbnail||photos[0]||HERO_IMG}">
      <div class="ov"><h2>${esc(t.title)}</h2><p>${fmtDate(t.startDate)} - ${fmtDate(t.endDate)} ・ ${nights}泊${t.days.length}日</p></div>
    </div>
    <div class="sec-title">📸 旅の写真（${photos.length}枚）</div>
    ${photos.length? `<div class="photo-grid">${photos.map(p=>`<img src="${p}">`).join('')}</div>` : `<p style="padding:0 20px;font-size:12.5px;color:var(--ink-soft)">イベントに写真を追加すると、ここに表示されます。</p>`}
    <div class="sec-title">📊 サマリー</div>
    <div class="mem-stats">
      <div class="mem-stat"><div class="v">${evs.length}</div><div class="l">イベント数</div></div>
      <div class="mem-stat"><div class="v">${spots}</div><div class="l">訪問スポット</div></div>
      <div class="mem-stat"><div class="v">${yen(spent)}</div><div class="l">総支出</div></div>
    </div>
    <div class="sec-title">⭐ 評価</div>
    <div style="padding:0 20px 16px;display:flex;gap:6px" id="ratingRow">
      ${[1,2,3,4,5].map(i=>`<button data-star="${i}" style="font-size:26px;color:${i<=(t.rating||0)?'#E8A93B':'#DDE5EA'}"><span class="material-symbols-rounded" style="font-variation-settings:'FILL' ${i<=(t.rating||0)?1:0}">star</span></button>`).join('')}
    </div>
    <div class="sec-title">📝 旅のメモ</div>
    <div style="padding:0 20px"><textarea id="memNote" style="width:100%;min-height:90px;padding:14px;border-radius:14px;border:1.5px solid var(--line);font-size:13.5px" placeholder="旅の思い出を書き残しましょう">${esc(t.memNote||'')}</textarea></div>
    <div style="padding:16px 20px 0"><button class="btn-primary" id="saveMemNote">メモを保存する</button></div>
  </div>`;
}
function bindMemory(){
  document.getElementById('btnExitMem').onclick = ()=>{ CUR.mode='list'; render(); };
  const t = currentTrip();
  document.querySelectorAll('[data-star]').forEach(b=>b.onclick=()=>{ t.rating=+b.dataset.star; save(); render(); });
  document.getElementById('saveMemNote').onclick = ()=>{ t.memNote = document.getElementById('memNote').value; save(); toast('メモを保存しました'); };
}
</script>
</body>
</html>

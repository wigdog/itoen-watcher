<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Travel OS ─ 旅行をもっと自由に</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0..200" />
<style>
:root{
  --ocean:#0F6BA8;
  --ocean-deep:#0A4B78;
  --sky:#5BB8E8;
  --sunset:#FF7A45;
  --bg:#F7FAFC;
  --surface:#FFFFFF;
  --ink:#0E2233;
  --ink-soft:#5A7080;
  --line:#E4ECF1;
  font-family:"Zen Kaku Gothic New","Poppins",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(91,184,232,.28), transparent 60%),
    radial-gradient(900px 500px at 110% 10%, rgba(255,122,69,.16), transparent 55%),
    var(--bg);
  color:var(--ink);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;line-height:1;}
.wrap{width:100%;max-width:440px;}
.eyebrow{display:flex;align-items:center;gap:8px;font-family:'Poppins';font-size:11px;font-weight:600;letter-spacing:.16em;color:var(--ocean-deep);margin-bottom:14px;text-transform:uppercase;}
.eyebrow .dot{width:5px;height:5px;border-radius:50%;background:var(--sunset);}
h1{font-size:30px;font-weight:900;line-height:1.35;letter-spacing:.01em;margin-bottom:10px;}
h1 span{color:var(--ocean);}
p.lead{font-size:14px;line-height:1.85;color:var(--ink-soft);margin-bottom:32px;max-width:380px;}
.cards{display:flex;flex-direction:column;gap:14px;}
.card{
  display:flex;align-items:center;gap:16px;
  padding:20px;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:20px;
  text-decoration:none;
  color:inherit;
  box-shadow:0 8px 24px -12px rgba(15,107,168,.18);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.card:hover{transform:translateY(-2px);box-shadow:0 14px 30px -12px rgba(15,107,168,.28);}
.card:active{transform:translateY(0) scale(.99);}
.card .ic{
  flex:none;width:52px;height:52px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
}
.card.edit .ic{background:linear-gradient(135deg,var(--ocean),var(--ocean-deep));color:#fff;}
.card.view .ic{background:rgba(255,122,69,.14);color:var(--sunset);}
.card .body{flex:1;min-width:0;}
.card .tag{font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:3px;}
.card .title{font-size:16px;font-weight:800;margin-bottom:3px;}
.card .desc{font-size:12.5px;color:var(--ink-soft);line-height:1.6;}
.card .chev{flex:none;color:var(--ink-soft);opacity:.6;}
.foot{margin-top:28px;font-size:11.5px;color:var(--ink-soft);line-height:1.8;text-align:center;}
.foot code{background:var(--line);padding:2px 6px;border-radius:6px;font-family:'Poppins',monospace;font-size:11px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow"><span class="dot"></span>TRAVEL OS</div>
  <h1>旅の予定を、<br><span>編集する人</span>と<span>見る人</span>へ。</h1>
  <p class="lead">編集用アプリで旅程を組み立てて、閲覧専用ページで家族や友人に共有できます。</p>

  <div class="cards">
    <a class="card edit" href="./travel_os.html">
      <div class="ic"><span class="material-symbols-rounded">edit_calendar</span></div>
      <div class="body">
        <div class="tag">For editors</div>
        <div class="title">Travel OS を開く</div>
        <div class="desc">旅程・予算・持ち物を編集する</div>
      </div>
      <span class="material-symbols-rounded chev">chevron_right</span>
    </a>

    <a class="card view" href="./view.html">
      <div class="ic"><span class="material-symbols-rounded">visibility</span></div>
      <div class="body">
        <div class="tag">For everyone else</div>
        <div class="title">旅のしおりを見る</div>
        <div class="desc">閲覧専用・編集や保存はできません</div>
      </div>
      <span class="material-symbols-rounded chev">chevron_right</span>
    </a>
  </div>

  <p class="foot">閲覧ページは <code>data/trips.json</code> を自動で読み込みます。<br>更新は編集アプリの「全データを書き出し」から。</p>
</div>
</body>
</html>
